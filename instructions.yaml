# BhumiDrishti — Assessment Fields Reference
# Used in Gemma 4 system prompt to guide structured JSON output
# Every field Gemma 4 must fill is described with allowed values and examples

# =============================================================
# IDENTITY FIELDS — filled by backend, NOT by Gemma 4
# =============================================================

id:
  filled_by: backend
  format: "ASS-{random 4 digit number}"
  example: "ASS-2847"

created_at:
  filled_by: backend
  format: ISO 8601 timestamp

# =============================================================
# LOCATION FIELDS — filled by backend from GPS, NOT by Gemma 4
# =============================================================

lat:
  filled_by: backend
  source: GPS from field worker device or image EXIF
  example: 36.2021

lon:
  filled_by: backend
  source: GPS from field worker device or image EXIF
  example: 36.1607

province:
  filled_by: backend
  source: PostGIS reverse geocode against turkey_provinces
  allowed_values: ["Hatay", "Adiyaman"]

district:
  filled_by: backend
  source: PostGIS reverse geocode against turkey_districts_pts
  example: "Antakya"

# =============================================================
# INPUT TYPE — filled by backend, NOT by Gemma 4
# =============================================================

input_type:
  filled_by: backend
  allowed_values:
    - ground_photo     # single or multiple JPEG/PNG from phone or camera
    - drone_images     # multiple oblique JPEGs from drone flight
    - drone_orthophoto # georeferenced GeoTIFF mosaic from drone
    - video            # MP4 or MOV walkthrough footage

# =============================================================
# FILE PATHS — filled by backend, NOT by Gemma 4
# =============================================================

photo_path:
  filled_by: backend
  description: relative path to the main display image
  example: "uploads/photos/ass_2847_photo.jpg"

video_path:
  filled_by: backend
  description: relative path to original video file, null if not video input
  example: "uploads/videos/ass_2848_video.mp4"

ortho_path:
  filled_by: backend
  description: relative path to original GeoTIFF, null if not orthophoto input
  example: "uploads/orthophotos/hatay_batch_001.tif"

chip_path:
  filled_by: backend
  description: relative path to building chip JPEG, only for orthophoto input
  example: "uploads/chips/ass_2901_osm_12345.jpg"

drone_frames:
  filled_by: backend
  description: JSON array of frame paths analyzed, only for drone or video input
  example: ["uploads/frames/ass_2848_frame_001.jpg", "uploads/frames/ass_2848_frame_002.jpg"]

# =============================================================
# SPATIAL CONTEXT — filled by backend from PostGIS, NOT by Gemma 4
# =============================================================

flood_zone:
  filled_by: backend
  source: PostGIS flood_zones table spatial query
  type: boolean
  description: true if building location falls within a 300m buffer of any waterway

flood_return_period:
  filled_by: backend
  source: PostGIS flood_zones table
  allowed_values: ["100yr", "50yr", "estimated_river_buffer", "none"]
  description: flood return period if in flood zone, none if not

elevation_m:
  filled_by: backend
  source: Rasterio point query on turkey_dem_cog.tif
  type: float
  description: metres above sea level at the building location
  example: 64.3

slope_degrees:
  filled_by: backend
  source: Rasterio calculates slope from DEM neighbourhood
  type: float
  description: terrain slope in degrees at the building location
  example: 8.2

slope_risk:
  filled_by: backend
  source: derived from slope_degrees
  allowed_values: ["high", "moderate", "low"]
  rules:
    high: slope_degrees > 20
    moderate: slope_degrees 10 to 20
    low: slope_degrees < 10

nearest_shelter:
  filled_by: backend
  source: PostGIS nearest neighbour query on turkey_points
  description: name of nearest amenity point that can serve as shelter
  filter: amenity IN (hospital, clinic, school, community_centre, mosque, police)
  example: "Antakya Lisesi"

shelter_distance_m:
  filled_by: backend
  source: PostGIS ST_Distance from building to nearest shelter
  type: float
  description: straight line distance in metres to nearest shelter
  example: 340.5

shelter_type:
  filled_by: backend
  source: amenity column from turkey_points
  allowed_values: ["hospital", "clinic", "school", "community_centre", "mosque", "police", "other"]

road_access:
  filled_by: backend
  source: PostGIS nearest road from turkey_lines where highway IS NOT NULL
  allowed_values: ["passable", "blocked", "unknown"]
  note: backend defaults to unknown, Gemma 4 can update this from visual analysis

nearest_road:
  filled_by: backend
  source: name column from turkey_lines nearest highway feature
  example: "Atatürk Caddesi"

road_distance_m:
  filled_by: backend
  source: PostGIS ST_Distance from building to nearest road
  type: float
  example: 45.2

osm_building_id:
  filled_by: backend
  source: PostGIS ST_Contains query against turkey_buildings
  type: integer or null
  description: OSM id of the building footprint if GPS falls inside a known footprint

building_type:
  filled_by: backend then Gemma 4 can refine
  source: building column from turkey_buildings OSM data
  description: backend fills from OSM, Gemma 4 can correct if image shows different type
  common_values: ["residential", "apartments", "house", "commercial", "school",
                  "hospital", "mosque", "industrial", "yes"]
  note: "yes" means OSM recorded a building but did not specify type — Gemma 4 should estimate from image

building_floors:
  filled_by: backend provides OSM value if available, Gemma 4 estimates if null
  source: building_levels column from turkey_buildings, often null in Turkish OSM data
  description: number of floors as string because OSM data is inconsistent
  note: Gemma 4 should estimate from image if OSM value is null
  example: "5" or "3-4" if uncertain

building_material:
  filled_by: Gemma 4 estimates from image, OSM rarely has this
  allowed_values: ["stone_masonry", "reinforced_concrete", "brick",
                   "timber", "mixed", "unknown"]
  description: primary structural material visible in image
  note: Turkish construction in Hatay and Adiyaman is predominantly stone masonry
        for older buildings and reinforced concrete for post-1980 buildings

# =============================================================
# DAMAGE ASSESSMENT — filled by Gemma 4 from image analysis
# =============================================================

severity:
  filled_by: Gemma 4
  type: integer 1 to 5
  description: overall structural damage severity score
  scale:
    1: minor — hairline cracks, no structural compromise, building habitable
    2: low — visible cracks, minor spalling, building usable with caution
    3: moderate — significant structural damage, partial wall collapse,
                  building must be evacuated
    4: critical — major structural failure, large section collapsed,
                  immediate danger to any remaining occupants
    5: extreme — complete or near-complete collapse, pancake or lean,
                 search and rescue required immediately
  instruction: >
    Assign the highest severity you can confidently justify from the image.
    When uncertain between two scores, assign the higher one.
    A partially collapsed building is at least severity 4.
    Any visible pancake collapse is severity 5.

damage_type:
  filled_by: Gemma 4
  allowed_values:
    - no_visible_damage       # building appears intact
    - hairline_cracks         # surface cracks only, structural integrity intact
    - structural_cracks       # deep cracks in load-bearing elements
    - facade_damage           # exterior walls damaged but structure standing
    - partial_wall_collapse   # one or more walls collapsed, structure partially standing
    - roof_collapse           # roof has failed, walls may be standing
    - partial_collapse        # significant portion of building has collapsed
    - full_collapse           # building has completely collapsed
    - pancake_collapse        # floors have collapsed onto each other horizontally
    - lean_or_tilt            # building is leaning or tilting significantly
    - fire_damage             # evidence of fire in addition to structural damage
    - flood_damage            # evidence of flood or water damage
  instruction: >
    Choose the single most accurate damage type that describes
    the primary damage pattern visible. If multiple types apply,
    choose the most severe one.

damage_description:
  filled_by: Gemma 4
  type: text, 1-3 sentences
  description: free text description of visible damage
  instruction: >
    Describe specifically what you see in the image.
    Include: which parts of the building are damaged,
    what the collapse pattern looks like,
    any secondary hazards visible such as exposed rebar,
    leaning walls, fire, water, or blocked access routes.
  example: >
    "Pancake collapse visible across all 5 floors. Eastern facade has
    completely failed. Large debris field extends 8-10 metres onto the
    street. Exposed rebar visible on north wall remnant."

structural_risk:
  filled_by: Gemma 4
  allowed_values: ["high", "moderate", "low", "unknown"]
  description: risk of secondary collapse or additional structural failure
  rules:
    high: any leaning walls, unstable debris, partial collapse where sections
          could fall, or any building with severity 4 or 5
    moderate: significant damage but structure appears stable for now,
              severity 3
    low: minor damage, no immediate risk of further collapse,
         severity 1 or 2
    unknown: image quality or angle does not allow confident assessment

estimated_occupants:
  filled_by: Gemma 4
  type: string
  description: estimated number of people who may be inside the building
  instruction: >
    Estimate based on building type, size, and number of floors.
    Use a range when uncertain.
    For residential buildings: assume 3-4 people per floor as a baseline.
    Reduce estimate if building shows signs of prior evacuation
    such as open doors, belongings outside, vehicles absent.
    If clear evidence of evacuation, use "0 - evacuated".
    If completely unknown, use "unknown".
  examples:
    - "6-8"
    - "~10"
    - "0 - evacuated"
    - "unknown"
    - "15-20"

occupant_status:
  filled_by: Gemma 4
  allowed_values:
    - unknown          # default, no information available
    - potentially_trapped  # collapse pattern suggests people may be inside
    - signs_of_life    # visible movement, sounds mentioned in field note
    - evacuated        # clear signs building was vacated before collapse
    - confirmed_clear  # field worker confirmed no occupants
  instruction: >
    Use potentially_trapped for any severity 4 or 5 building
    unless there is clear evidence of evacuation.
    Use evacuated only if you can see strong evidence such as
    open doors and windows, belongings removed, or no personal items visible.

recommended_action:
  filled_by: Gemma 4
  allowed_values:
    - immediate_search_rescue  # severity 5, potentially trapped occupants
    - urgent_evacuation        # severity 4, occupants may still be inside
    - evacuate_and_secure      # severity 3, building must be cleared
    - structural_assessment    # severity 2, needs engineer inspection
    - monitor                  # severity 1, no immediate action needed
    - no_action_needed         # no visible damage
  instruction: >
    Assign based on severity and occupant status combined.
    Severity 5 with unknown occupants always gets immediate_search_rescue.
    Severity 4 gets urgent_evacuation.
    Severity 3 gets evacuate_and_secure.
    Severity 2 gets structural_assessment.
    Severity 1 gets monitor.

action_priority:
  filled_by: Gemma 4
  type: integer 1 to 5
  description: triage priority for coordinator dispatch
  rules:
    5: immediate_search_rescue — act within minutes
    4: urgent_evacuation — act within the hour
    3: evacuate_and_secure — act within the day
    2: structural_assessment — act within 48 hours
    1: monitor or no_action — low urgency
  instruction: >
    This should match recommended_action in most cases.
    Increase priority by 1 if building is in a flood zone.
    Increase priority by 1 if slope_risk is high.
    Maximum value is 5.

road_access:
  filled_by: Gemma 4 can update this field
  description: >
    Backend sets this to unknown by default.
    If your image shows the access road is blocked by debris,
    update this to blocked.
    If the road appears clear, update to passable.
    Leave as unknown if road is not visible in image.
  allowed_values: ["passable", "blocked", "unknown"]

# =============================================================
# AI OUTPUT FIELDS — filled by Gemma 4
# =============================================================

reasoning:
  filled_by: Gemma 4
  type: text, 2-5 sentences
  description: explanation of why this severity and action were assigned
  instruction: >
    Explain your reasoning clearly.
    Reference specific visual evidence from the image.
    Mention how spatial context from PostGIS tools influenced your assessment.
    Be specific about what you saw that determined the severity score.
  example: >
    "Assigned severity 5 based on complete pancake collapse visible across
    all floors. Stone masonry construction with no reinforcement visible
    in exposed sections. Flood zone location increases secondary risk from
    potential water ingress into collapse voids. Nearest shelter at 340m
    is accessible via Atatürk Caddesi which appears passable in image.
    Immediate search and rescue is required before any rain event."

warnings:
  filled_by: Gemma 4
  type: JSON array of strings
  description: list of specific risk flags for this building
  allowed_values:
    - secondary_collapse_risk    # unstable sections that may fall
    - flood_zone                 # building is in flood zone
    - high_slope_risk            # terrain slope increases instability
    - fire_hazard                # evidence of fire or gas leak
    - road_blocked               # access road is blocked
    - hazmat_risk                # industrial building or visible chemicals
    - poor_image_quality         # image is too dark, blurry, or distant
    - partial_view_only          # image does not show full building
    - no_building_footprint      # GPS did not match any OSM building
  instruction: >
    Include all warnings that apply.
    Always include flood_zone if flood_zone field is true.
    Always include poor_image_quality if image is significantly
    degraded, blurry, taken at night, or shows less than 50% of building.
    Always include partial_view_only if orthophoto chip does not
    show the complete building footprint.
  example: ["secondary_collapse_risk", "flood_zone", "road_blocked"]

confidence:
  filled_by: Gemma 4
  type: float 0.0 to 1.0
  description: confidence in the overall assessment
  instruction: >
    Start at 1.0 and reduce for each uncertainty factor:
    - Image is blurry or dark: -0.2
    - Only partial building visible: -0.15
    - Assessment from orthophoto only (no ground photo): -0.2
    - OSM building footprint not matched: -0.1
    - Multiple conflicting visual signals: -0.1
    - Night image or very low light: -0.25
    Minimum confidence is 0.3.
    Ground photos in good daylight of clearly visible damage
    should have confidence 0.8 to 0.95.
  examples:
    - 0.89  # clear ground photo, good light, full building visible
    - 0.71  # orthophoto chip, building partially visible
    - 0.55  # blurry image, partial view

turkish_summary:
  filled_by: Gemma 4
  type: text, 2-3 sentences in Turkish
  description: summary of assessment in Turkish for field workers
  instruction: >
    Write a brief assessment summary in Turkish.
    Include severity, main damage type, and recommended action.
    Keep it simple and clear for field workers who may be stressed
    and reading quickly.
  example: >
    "Bina tamamen çökmüş, şiddet seviyesi 5/5. Enkaz altında kişi
    bulunma ihtimali yüksek, acil arama-kurtarma gerekli.
    En yakın sığınak 340 metre mesafede, Atatürk Caddesi üzerinden ulaşılabilir."

model_used:
  filled_by: backend
  default: "gemma4:26b"

inference_seconds:
  filled_by: backend
  description: time taken for Gemma 4 to complete the assessment
  type: float

# =============================================================
# FIELD WORKER FIELDS — filled by backend from request, NOT Gemma 4
# =============================================================

worker_name:
  filled_by: backend
  source: entered by field worker at app start or in request header

worker_device:
  filled_by: backend
  source: device identifier from request

field_note:
  filled_by: backend
  source: optional text entered by field worker before uploading
  description: >
    This field is passed to Gemma 4 as additional context
    but not filled by Gemma 4. Field worker notes like
    "heard voices inside" or "road blocked from north"
    significantly improve Gemma 4 accuracy and should
    always be included in the prompt when present.

# =============================================================
# BATCH FIELDS — filled by backend for orthophoto processing
# =============================================================

batch_id:
  filled_by: backend
  description: shared ID for all assessments from one orthophoto upload
  format: "BATCH-{timestamp}-{random}"
  example: "BATCH-20230206-A4K7"
  note: null for ground photo and drone input types

batch_building_count:
  filled_by: backend
  description: total number of buildings in this orthophoto batch
  type: integer or null

# =============================================================
# STATUS FIELDS — managed by backend workflow
# =============================================================

status:
  filled_by: backend workflow
  default: "pending"
  allowed_values:
    pending:         newly created, awaiting coordinator review
    in_review:       coordinator has opened and is reviewing
    responded:       response team has been dispatched
    closed:          response complete, building documented
    false_positive:  assessment was incorrect, no actual damage

verified_by_ground:
  filled_by: coordinator or field worker
  type: boolean
  default: false
  description: >
    Set to true when an orthophoto-only assessment has been
    physically verified by a field worker visiting the site.
    Only relevant for drone_orthophoto input type.

response_team:
  filled_by: coordinator
  description: name of rescue or response team dispatched
  example: "AFAD Team 3"

response_notes:
  filled_by: coordinator
  description: coordinator notes about the response action taken

responded_at:
  filled_by: backend
  description: timestamp when status changed to responded

# =============================================================
# GEMMA 4 JSON OUTPUT FORMAT
# This is exactly what Gemma 4 must return
# =============================================================

# Gemma 4 returns ONLY this JSON, nothing else.
# Backend fills all other fields before saving to database.

gemma4_output_schema:
  severity: integer          # 1-5
  damage_type: string        # from allowed_values above
  damage_description: string # 1-3 sentences
  structural_risk: string    # high|moderate|low|unknown
  building_type: string      # refine from OSM value if image shows different
  building_floors: string    # estimate if OSM value was null
  building_material: string  # from allowed_values above
  estimated_occupants: string
  occupant_status: string    # from allowed_values above
  recommended_action: string # from allowed_values above
  action_priority: integer   # 1-5
  road_access: string        # passable|blocked|unknown
  reasoning: string          # 2-5 sentences
  warnings: array            # list of warning strings
  confidence: float          # 0.0-1.0
  turkish_summary: string    # 2-3 sentences in Turkish

# Example valid Gemma 4 output:
example_output: |
  {
    "severity": 5,
    "damage_type": "pancake_collapse",
    "damage_description": "Complete pancake collapse across all 5 floors. Eastern facade has fully failed exposing floor slabs. Large debris field extends onto street. Exposed rebar visible on north wall remnant.",
    "structural_risk": "high",
    "building_type": "residential",
    "building_floors": "5",
    "building_material": "stone_masonry",
    "estimated_occupants": "6-8",
    "occupant_status": "potentially_trapped",
    "recommended_action": "immediate_search_rescue",
    "action_priority": 5,
    "road_access": "blocked",
    "reasoning": "Assigned severity 5 based on complete pancake collapse visible across all floors. Stone masonry construction with no reinforcement visible in exposed sections. Flood zone location increases secondary risk. Road appears blocked by debris in foreground. Immediate search and rescue required.",
    "warnings": ["secondary_collapse_risk", "flood_zone", "road_blocked"],
    "confidence": 0.89,
    "turkish_summary": "Bina tamamen çökmüş, şiddet seviyesi 5/5. Enkaz altında kişi bulunma ihtimali yüksek, acil arama-kurtarma gerekli. Atatürk Caddesi enkaz nedeniyle kapalı görünüyor."
  }