services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bhumidrishti_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bhumidrishti
      - POSTGRES_USER=bhumidrishti
      - POSTGRES_PASSWORD=bhumidrishti
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhumidrishti -d bhumidrishti"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GEMMA_MODEL=${GEMMA_MODEL:-gemma4:e4b}
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c '
      set -e;
      echo "Waiting for Ollama to be ready...";
      until ollama list > /dev/null 2>&1; do sleep 3; done;
      MODEL=$${GEMMA_MODEL:-gemma4:e4b};
      echo "Checking model: $$MODEL";
      if ollama show $$MODEL > /dev/null 2>&1; then
        echo "Model already present, skipping: $$MODEL";
      else
        echo "Pulling model $$MODEL — this may take 10-20 min on first run...";
        ollama pull $$MODEL;
      fi;
      echo "Model ready: $$MODEL";
      '

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    container_name: bhumidrishti_titiler
    ports:
      - "8001:8000"
    volumes:
      # DEM elevation data
      - ./data/turkey_data/Adiyaman/dem_data:/data/adiyaman
      - ./data/turkey_data/Hatay/dem_data:/data/hatay
      # Pre-earthquake satellite / drone imagery (COG)
      - ./data/turkey_data/Adiyaman:/data/satellite/adiyaman
      - ./data/turkey_data/Hatay:/data/satellite/hatay
      # Post-earthquake uploaded orthophotos (COG)
      - ./uploads:/data/uploads
    environment:
      - TITILER_API_DISABLE_STAC=TRUE
      - TITILER_API_DISABLE_MOSAIC=TRUE

  osrm:
    image: osrm/osrm-backend
    container_name: bhumidrishti_osrm
    volumes:
      - ./data/osrm:/data
    command: osrm-routed --algorithm mld /data/turkey-latest.osrm
    ports:
      - "5000:5000"

  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: bhumidrishti_tileserver
    volumes:
      - ./data/tiles_data:/data
    command: ["--config", "/data/config.json", "--port", "8080"]
    ports:
      - "8090:8080"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bhumidrishti_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./uploads:/app/data/uploads
    env_file:
      - ./backend/.env
    environment:
      - TILE_SERVER_URL=http://tileserver:8080/styles/basic/{z}/{x}/{y}.png
    depends_on:
      postgres:
        condition: service_healthy
      gis-loader:
        condition: service_completed_successfully
      ollama:
        condition: service_started
      titiler:
        condition: service_started
      osrm:
        condition: service_started
      tileserver:
        condition: service_started

  gis-loader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bhumidrishti_gis_loader
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - ./backend/.env
    command: ["bash", "/app/scripts/load_data.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bhumidrishti_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  ollama_data:
  postgres_data:
